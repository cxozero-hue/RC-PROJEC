name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract source zip if present
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            echo "Found $ZIP_FILE, extracting..."
            unzip -o "$ZIP_FILE" -d _extracted
            SRC_DIR=$(find _extracted -maxdepth 3 -name "package.json" -exec dirname {} \; | head -n 1)
            echo "Detected source dir: $SRC_DIR"
            rsync -a --exclude='.github' "$SRC_DIR"/ ./
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            npx cap copy android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate app icons and splash screen
        run: npx @capacitor/assets generate --android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruang-cerita-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
